services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: costlens-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shivamkhokhani -d costlens"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  backend:
    build:
      context: ./backend
    container_name: costlens-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/costlens
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    restart: on-failure
    
  
  dashboard:
    build:
      context: ./dashboard
    container_name: costlens-dashboard
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: